<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 85">
  <!-- ONS Symbol (the distinctive quarter circle design) -->
  <g transform="translate(0,5)">
    <!-- Main quarter circle shape -->
    <path d="M35,0 A35,35 0 0,1 70,35 L35,35 Z" fill="#27A0CC"/>
    <!-- Inner white quarter -->
    <path d="M35,8 A27,27 0 0,1 62,35 L35,35 Z" fill="#003C57"/>
  </g>
  
  <!-- Text: Office for National Statistics (stacked) -->
  <text x="85" y="32" font-family="Arial, Helvetica, sans-serif" font-size="17" fill="white" font-weight="400">Office for National</text>
  <text x="85" y="55" font-family="Arial, Helvetica, sans-serif" font-size="17" fill="white" font-weight="400">Statistics</text>
</svg>
