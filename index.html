<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dot Density Map Prototype</title>
  <link rel="stylesheet" href="/src/styles.css">
</head>
<body>
  <div id="map"></div>
  <div id="controls">
    <h3>Dot Density Controls</h3>
    <label>
      Dots per unit:
      <input type="range" id="density" min="1" max="100" value="10">
      <span id="density-value">10</span>
    </label>
    <label>
      Dot size:
      <input type="range" id="dot-size" min="1" max="10" value="3">
      <span id="dot-size-value">3</span>
    </label>
    <label>
      Opacity:
      <input type="range" id="opacity" min="0.1" max="1" step="0.1" value="0.7">
      <span id="opacity-value">0.7</span>
    </label>
  </div>
  <div id="legend"></div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
